version: "2"
sql:
  - engine: "postgresql"
    queries: "db/"
    schema:
      - "prisma/migrations/00001_init/migration.sql"
      - "prisma/migrations/00002_rls/migration.sql"
    gen:
      go:
        package: "db"
        out: "db"
        sql_package: "pgx/v5"
        omit_unused_structs: true
        emit_exact_table_names: true
        emit_result_struct_pointers: true
        emit_params_struct_pointers: true
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "timestamptz"
            go_type: "time.Time"
